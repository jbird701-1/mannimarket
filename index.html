<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mannimarket &mdash; Workplace Prediction Markets</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0f12;
    --bg2: #141720;
    --bg3: #1c2030;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f0f2f5;
    --muted: #7a8299;
    --faint: #3a4055;
    --green: #22c55e;
    --green-dim: rgba(34,197,94,0.12);
    --green-border: rgba(34,197,94,0.3);
    --red: #ef4444;
    --mono: 'DM Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  nav {
    border-bottom: 1px solid var(--border);
    padding: 0 1.25rem;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(13,15,18,0.95);
    backdrop-filter: blur(12px);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .nav-left { display: flex; align-items: center; gap: 16px; }

  .logo {
    font-family: var(--mono);
    font-size: 16px;
    font-weight: 500;
    color: var(--text);
  }
  .logo span { color: var(--green); }

  .nav-pill {
    background: var(--green-dim);
    border: 1px solid var(--green-border);
    color: var(--green);
    font-size: 11px;
    font-family: var(--mono);
    padding: 3px 10px;
    border-radius: 20px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .dot {
    width: 6px;
    height: 6px;
    background: var(--green);
    border-radius: 50%;
    animation: pulse 2s infinite;
    flex-shrink: 0;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .nav-right {
    font-size: 12px;
    color: var(--muted);
    font-family: var(--mono);
  }

  main {
    max-width: 860px;
    margin: 0 auto;
    padding: 2rem 1.25rem 4rem;
  }

  .hero { margin-bottom: 2rem; }

  .hero-eyebrow {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: .1em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .hero-title {
    font-size: 26px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 4px;
    letter-spacing: -0.02em;
  }

  .hero-sub {
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 1.25rem;
  }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
  }

  @media (min-width: 480px) {
    .stats-row { grid-template-columns: repeat(4, 1fr); }
  }

  .stat-box {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: .9rem;
    text-align: center;
  }

  .stat-val {
    font-family: var(--mono);
    font-size: 18px;
    font-weight: 500;
    color: var(--text);
    display: block;
    margin-bottom: 4px;
  }

  .stat-lbl {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .05em;
  }

  .section-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
  }

  .section-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .1em;
    white-space: nowrap;
  }

  .section-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .markets { display: flex; flex-direction: column; gap: 10px; }

  .market-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
    transition: border-color .2s;
    -webkit-tap-highlight-color: transparent;
  }

  .market-card.open { border-color: var(--green-border); }

  .market-summary { padding: 1rem 1.1rem; }

  .market-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 10px;
  }

  .market-q {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.45;
    flex: 1;
  }

  .market-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 4px;
    flex-shrink: 0;
  }

  .market-prob {
    font-family: var(--mono);
    font-size: 22px;
    font-weight: 500;
    color: var(--green);
  }

  .market-chevron {
    font-size: 11px;
    color: var(--muted);
    transition: transform .2s;
  }

  .market-card.open .market-chevron { transform: rotate(180deg); }

  .bar-wrap {
    background: var(--faint);
    border-radius: 3px;
    height: 4px;
    width: 100%;
    margin-bottom: 8px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    background: var(--green);
    border-radius: 3px;
  }

  .market-footer {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--muted);
    font-family: var(--mono);
  }

  .market-detail {
    display: none;
    border-top: 1px solid var(--border);
    padding: 1rem 1.1rem;
    background: rgba(0,0,0,0.25);
  }

  .market-card.open .market-detail { display: block; }

  .detail-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 12px;
  }

  .dstat {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: .6rem;
    text-align: center;
  }

  .dstat-val {
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    display: block;
    margin-bottom: 2px;
  }

  .dstat-lbl { font-size: 11px; color: var(--muted); }

  .btn-row { display: flex; gap: 8px; margin-bottom: 12px; }

  .btn-yes {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    background: var(--green);
    color: #0a1a0e;
    font-family: var(--sans);
  }

  .btn-no {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border2);
    font-family: var(--sans);
  }

  .resolve-note {
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 12px;
    line-height: 1.5;
    font-family: var(--mono);
    padding: 8px 10px;
    background: var(--bg);
    border-radius: 6px;
    border-left: 2px solid var(--faint);
  }

  .trades-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .1em;
    margin-bottom: 8px;
  }

  .trade {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 5px 0;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    gap: 8px;
  }

  .trade:last-child { border-bottom: none; }
  .trade-user { color: var(--muted); font-family: var(--mono); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .trade-yes { color: var(--green); font-weight: 500; font-family: var(--mono); white-space: nowrap; }
  .trade-no { color: var(--red); font-weight: 500; font-family: var(--mono); white-space: nowrap; }
  .trade-time { color: var(--faint); font-family: var(--mono); font-size: 11px; white-space: nowrap; }

  footer {
    border-top: 1px solid var(--border);
    padding: 1.5rem 1.25rem;
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    font-family: var(--mono);
    margin-top: 3rem;
  }

  footer span { color: var(--faint); }
</style>
</head>
<body>

<nav>
  <div class="nav-left">
    <div class="logo">Manni<span>market</span></div>
    <div class="nav-pill"><div class="dot"></div>Live</div>
  </div>
  <div class="nav-right">Apr 7, 2026</div>
</nav>

<main>
  <div class="hero">
    <div class="hero-eyebrow">Workplace prediction markets</div>
    <div class="hero-title">Will Manni?</div>
    <div class="hero-sub">Real-time odds on today's most anticipated workplace events.</div>
    <div class="stats-row">
      <div class="stat-box"><span class="stat-val">6</span><span class="stat-lbl">Active markets</span></div>
      <div class="stat-box"><span class="stat-val">$14,270</span><span class="stat-lbl">Total volume</span></div>
      <div class="stat-box"><span class="stat-val">80%</span><span class="stat-lbl">Avg yes prob</span></div>
      <div class="stat-box"><span class="stat-val">94%</span><span class="stat-lbl">Hist. accuracy</span></div>
    </div>
  </div>

  <div class="section-header">
    <div class="section-label">Markets</div>
    <div class="section-line"></div>
  </div>

  <div class="markets" id="markets"></div>
</main>

<footer>
  Mannimarket is for entertainment purposes only. &nbsp;<span>Please do not show Manni.</span>
</footer>

<script>
const markets = [
  {
    q: "Will Manni quit today?",
    prob: 89,
    vol: "$4,182",
    traders: 247,
    hist: "94%",
    resolve: "Resolves Yes if Manni verbally states intention to quit, resign, or walk out before end of business today.",
    trades: [
      {user:"anon_trader_88", side:"yes", amt:"+$200 Yes", time:"4m ago"},
      {user:"riskmaniac", side:"no", amt:"+$50 No", time:"11m ago"},
      {user:"officewatcher", side:"yes", amt:"+$500 Yes", time:"23m ago"},
      {user:"quitsoon2026", side:"yes", amt:"+$150 Yes", time:"41m ago"},
      {user:"contrarian_kyle", side:"no", amt:"+$25 No", time:"1h ago"},
    ]
  },
  {
    q: "Will Manni say he is taking tomorrow off?",
    prob: 76,
    vol: "$2,340",
    traders: 183,
    hist: "81%",
    resolve: "Resolves Yes if Manni verbally or via message states he will not be in tomorrow before end of business today.",
    trades: [
      {user:"mondayhater99", side:"yes", amt:"+$300 Yes", time:"2m ago"},
      {user:"contrarian_kyle", side:"no", amt:"+$25 No", time:"9m ago"},
      {user:"coworker_vibes", side:"yes", amt:"+$175 Yes", time:"18m ago"},
      {user:"hrwatcher", side:"yes", amt:"+$400 Yes", time:"35m ago"},
      {user:"optimist_prime", side:"no", amt:"+$60 No", time:"52m ago"},
    ]
  },
  {
    q: "Will Manni say he is cold today?",
    prob: 91,
    vol: "$3,610",
    traders: 298,
    hist: "96%",
    resolve: "Resolves Yes if Manni mentions being cold, the temperature, or asks someone to adjust the thermostat at any point today.",
    trades: [
      {user:"thermostat_watcher", side:"yes", amt:"+$600 Yes", time:"1m ago"},
      {user:"contrarian_kyle", side:"no", amt:"+$25 No", time:"14m ago"},
      {user:"sweater_szn", side:"yes", amt:"+$220 Yes", time:"27m ago"},
      {user:"hvac_degen", side:"yes", amt:"+$180 Yes", time:"44m ago"},
      {user:"warmthskeptic", side:"no", amt:"+$40 No", time:"1h ago"},
    ]
  },
  {
    q: "Will Manni say he is \"frustrated\"?",
    prob: 78,
    vol: "$1,708",
    traders: 141,
    hist: "83%",
    resolve: "Resolves Yes if Manni uses the word frustrated, or a clear synonym, when describing his state of mind at any point today.",
    trades: [
      {user:"wordtracker_9", side:"yes", amt:"+$250 Yes", time:"6m ago"},
      {user:"contrarian_kyle", side:"no", amt:"+$25 No", time:"20m ago"},
      {user:"vibecheck2026", side:"yes", amt:"+$190 Yes", time:"33m ago"},
      {user:"sentimentdegen", side:"yes", amt:"+$310 Yes", time:"58m ago"},
      {user:"calmbeliever", side:"no", amt:"+$55 No", time:"1h 12m ago"},
    ]
  },
  {
    q: "Will Manni burst in and announce \"guess who's back, bitches\"?",
    prob: 64,
    vol: "$1,450",
    traders: 112,
    hist: "69%",
    resolve: "Resolves Yes if Manni enters the workplace and makes an unsolicited announcement referencing his own return, in any form, at any volume.",
    trades: [
      {user:"entrancetracker", side:"yes", amt:"+$400 Yes", time:"5m ago"},
      {user:"contrarian_kyle", side:"no", amt:"+$25 No", time:"18m ago"},
      {user:"dramaticentry_fan", side:"yes", amt:"+$275 Yes", time:"30m ago"},
      {user:"vibecheck2026", side:"yes", amt:"+$180 Yes", time:"47m ago"},
      {user:"quietarrival_hope", side:"no", amt:"+$70 No", time:"1h ago"},
    ]
  },
  {
    q: "Will Manni tell us he is taking the rest of the week off?",
    prob: 72,
    vol: "$980",
    traders: 98,
    hist: "77%",
    resolve: "Resolves Yes if Manni announces he will not be in for the remainder of the work week, by any method of communication, before 5pm today.",
    trades: [
      {user:"weekendstartsmon", side:"yes", amt:"+$350 Yes", time:"3m ago"},
      {user:"contrarian_kyle", side:"no", amt:"+$25 No", time:"16m ago"},
      {user:"pto_prophet", side:"yes", amt:"+$200 Yes", time:"31m ago"},
      {user:"vacay_arb", side:"yes", amt:"+$150 Yes", time:"49m ago"},
      {user:"attendance_bull", side:"no", amt:"+$45 No", time:"1h 5m ago"},
    ]
  }
];

const container = document.getElementById('markets');

markets.forEach(m => {
  const card = document.createElement('div');
  card.className = 'market-card';

  const tradesHTML = m.trades.map(t => `
    <div class="trade">
      <span class="trade-user">${t.user}</span>
      <span class="trade-${t.side}">${t.amt}</span>
      <span class="trade-time">${t.time}</span>
    </div>
  `).join('');

  card.innerHTML = `
    <div class="market-summary">
      <div class="market-top">
        <div class="market-q">${m.q}</div>
        <div class="market-right">
          <div class="market-prob">${m.prob}%</div>
          <div class="market-chevron">&#9660;</div>
        </div>
      </div>
      <div class="bar-wrap"><div class="bar-fill" style="width:${m.prob}%"></div></div>
      <div class="market-footer">
        <span>${m.vol} &middot; ${m.traders} traders</span>
        <span>${m.hist} hist.</span>
      </div>
    </div>
    <div class="market-detail">
      <div class="detail-grid">
        <div class="dstat"><span class="dstat-val">${m.vol}</span><span class="dstat-lbl">Volume</span></div>
        <div class="dstat"><span class="dstat-val">${m.traders}</span><span class="dstat-lbl">Traders</span></div>
        <div class="dstat"><span class="dstat-val">${m.hist}</span><span class="dstat-lbl">Hist. rate</span></div>
      </div>
      <div class="btn-row">
        <button class="btn-yes">Bet Yes</button>
        <button class="btn-no">Bet No</button>
      </div>
      <div class="resolve-note">${m.resolve}</div>
      <div class="trades-label">Recent activity</div>
      ${tradesHTML}
    </div>
  `;

  card.addEventListener('click', () => card.classList.toggle('open'));
  container.appendChild(card);
});
</script>
</body>
</html>
